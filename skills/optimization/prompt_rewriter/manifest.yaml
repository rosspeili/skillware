name: "optimization/prompt_rewriter"
version: "0.1.0"
description: "A powerful middleware skill that aggressively compresses massive, bloated prompts into fewer tokens while retaining 100% of the semantic meaning and instructions."
category: "optimization"
inputs:
  raw_text:
    type: "string"
    description: "The bloated, repetitive prompt or extensive conversation history to compress."
  compression_aggression:
    type: "string"
    description: "The level of compression: 'low', 'medium', or 'high'."
    enum: ["low", "medium", "high"]
outputs:
  compressed_text:
    type: "string"
    description: "The aggressively shortened prompt retaining semantic constraints."
  original_tokens:
    type: "integer"
    description: "The approximate original length."
  new_tokens:
    type: "integer"
    description: "The approximate new length."
  tokens_saved:
    type: "integer"
    description: "The absolute number of tokens removed."
presentation:
  icon: "minimize"
  color: "#9b59b6"
