name: compliance/pii_masker
version: 0.1.0
description: High-precision, local PII detection and redaction using the micro-f1-mask model via Ollama.
parameters:
  type: object
  properties:
    text:
      type: string
      description: The raw, sensitive input string.
    mode:
      type: string
      description: "Options: mask, redact, or remove. Controls how the identified tokens are handled."
    ollama_url:
      type: string
      description: The Ollama API endpoint (defaults to http://localhost:11434).
  required:
    - text
requirements:
  - requests
constitution: |
  1. USER PRIVACY: Do not store or transmit sensitive PII externally; only use the specified local model.
  2. ACCURACY: In mask mode, perfectly preserve the structural tags (e.g., [PERSON_1]) for downstream replacement.
  3. COMPLIANCE: Adhere strictly to the chosen mode (mask/redact/remove).
