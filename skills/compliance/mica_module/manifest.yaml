name: compliance/mica_module
version: 0.1.0
description: A highly specialized, localized RAG and policy enforcement engine for the Markets in Crypto-Assets (MiCA) regulation.
parameters:
  type: object
  properties:
    user_prompt:
      type: string
      description: The user's query regarding crypto-assets, e-money licenses, or MiCA rules.
    run_evaluator:
      type: boolean
      description: If true, triggers a lightweight side-call to evaluate and correct the response against regulatory holes.
    evaluator_model:
      type: string
      description: "Optional. Specify the model for the evaluator node (e.g., 'gemini-2.5-flash-lite'). Defaults to gemini-2.5-flash-lite."
  required:
    - user_prompt
requirements:
  - google.generativeai
constitution: |
  1. COMPLIANCE: Do not invent or hallucinate financial regulations. Base all enforcement strictly on the provided MiCA corpus blocks.
  2. FOCUS: Act exclusively as a compliance firewall and RAG engine; retrieve relevant chunks incrementally.
  3. EVALUATION: If the evaluator is run, strictly flag HIGH_RISK_DETECTED if the user's intent violates MiCA or misses required filings.
