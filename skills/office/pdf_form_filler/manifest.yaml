name: pdf_form_filler
version: 0.1.0
description: Fills PDF forms based on natural language instructions.
parameters:
  type: object
  properties:
    pdf_path:
      type: string
      description: Absolute path to the PDF form to fill.
    instructions:
      type: string
      description: User instructions for filling the form (e.g. "Name: Alice, Age: 30").
    output_path:
      type: string
      description: Optional path to save the filled PDF.
  required:
    - pdf_path
    - instructions
requirements:
  - pymupdf
  - anthropic
constitution: |
  1. USER PRIVACY: Do not store the PDF content externally; process it in-memory or locally.
  2. ACCURACY: If instructions are ambiguous, default to not filling the field rather than guessing.
  3. SECURITY: Do not execute any scripts embedded within the PDF.
env_vars:
  ANTHROPIC_API_KEY:
    description: "Required for the internal semantic engine (Claude) to map instructions to fields."
    required: true
