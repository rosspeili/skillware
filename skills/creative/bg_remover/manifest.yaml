name: "creative/bg_remover"
version: "0.1.0"
description: "Remove image backgrounds locally using rembg."
short_description: "Offline background removal using rembg with transparent PNG output."

issuer:
  name: Ayush Srivastava
  email: "ayush.sri0705@gmail.com"
  github: AyushSrivastava1818
  org: ""

category: "creative"

parameters:
  type: object
  properties:
    image:
      type: string
      description: "Base64-encoded still image (preferred for chat/upload handoff)."

    input_path:
      type: string
      description: "Absolute or relative path to a local still image file."

    output_path:
      type: string
      description: "Optional path to write PNG; if omitted, result is base64-only in image_base64."

    model:
      type: string
      description: "rembg model; default isnet-general-use. Use u2net_human_seg for people."
      enum:
        - isnet-general-use
        - u2net
        - u2net_human_seg
        - silueta
      default: isnet-general-use

    alpha_matting:
      type: boolean
      description: "Enable alpha matting for finer edges (hair, fur); slower when true."
      default: false
  required: []

outputs:
  success:
    type: boolean
    description: "True when background removal completed successfully."

  image_base64:
    type: string
    description: "Base64-encoded transparent PNG (always set on success)."

  mime_type:
    type: string
    description: "Output MIME type (image/png on success)."

  output_path:
    type: string
    description: "Echo of the requested output path when provided."

  width:
    type: integer
    description: "Output image width in pixels."

  height:
    type: integer
    description: "Output image height in pixels."

  model_used:
    type: string
    description: "rembg model used for processing."

  error:
    type: string
    description: "Human-readable error message when success is false."

  error_code:
    type: string
    description: "INVALID_INPUT, MISSING_DEPENDENCY, or PROCESSING_FAILED."

requirements:
  - rembg>=2.0.0
  - pillow
  - onnxruntime

constitution: |
  1. IMAGE_ONLY: Process still images only.
  2. LOCAL_FIRST: Never use cloud APIs.
  3. PRIVACY: Never store image bytes.
  4. DETERMINISTIC: Same input produces same output.
  5. FAIL_CLOSED: Return structured errors on invalid input.

presentation:
  icon: "photo"
  color: "#8b5cf6"
