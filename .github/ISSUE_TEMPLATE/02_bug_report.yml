name: "Bug Report"
description: Create a report to help us improve Skillware.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue! Search [open bugs](https://github.com/ARPAHLS/skillware/issues?q=is%3Aopen+label%3Abug) first.

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Core Framework (loader, env, base_skill, adapters)
        - CLI (skillware list, test, examples, menu)
        - Specific Skill
        - Examples / agent loops
        - Documentation
        - Packaging / PyPI install
        - Tests / CI
        - Security
    validations:
      required: true

  - type: input
    id: skill_name
    attributes:
      label: Skill ID (if applicable)
      placeholder: finance/wallet_screening
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What is the current bug behavior?
      placeholder: |
        When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How do we trigger this bug?
      placeholder: |
        1. Loaded skill 'finance/wallet_screening'
        2. Ran examples/gemini_wallet_check.py
        3. Crash on first generate_content call
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste the traceback or error message (optional for Documentation bugs).
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, install method (pip vs editable clone), SDK versions.
      placeholder: |
        Windows 11
        Python 3.12
        pip install skillware[gemini]==0.4.3
        google-genai 1.0.0
    validations:
      required: false
