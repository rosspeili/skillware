name: "CLI"
description: Report a bug or propose a change to the skillware command-line interface.
title: "[CLI]: "
labels: ["cli", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Scope: `skillware/cli.py`, `skillware/__main__.py`, and [docs/usage/cli.md](https://github.com/ARPAHLS/skillware/blob/main/docs/usage/cli.md).

        For loader/path resolution logic in `skillware/core/loader.py`, use **Framework Feature** or **Bug Report** (Core Framework).

  - type: dropdown
    id: change_type
    attributes:
      label: Change type
      options:
        - Bug
        - Enhancement
        - Documentation only
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Command or area
      options:
        - skillware (interactive menu)
        - skillware list
        - skillware test
        - skillware examples
        - skillware --help / --version
        - python -m skillware
        - Path resolution / SKILLWARE_SKILL_PATH
        - Other
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - pip install skillware (PyPI)
        - pip install -e ".[dev]" or ".[dev,all]" (editable clone)
        - Both / unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Expected vs actual behavior, or the feature you want.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce (bugs)
      placeholder: |
        skillware examples
        Expected: ...
        Actual: ...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Windows 11, Python 3.12, skillware 0.4.6
    validations:
      required: false
