[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "skillware"
version = "0.4.3"
description = "A framework for modular, self-contained AI skills."
readme = "README.md"
authors = [
  { name = "ARPA Hellenic Logical Systems", email = "skillware-os@arpacorp.net" },
]
urls = { "Homepage" = "https://arpacorp.net", "Repository" = "https://github.com/arpahls/skillware" }
license = { file = "LICENSE" }
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests",
    "pyyaml",
    "python-dotenv",
    "beautifulsoup4",
    "packaging",
    "jsonschema>=4.0",
    "rich>=13.0",
]
requires-python = ">=3.10"

[project.scripts]
skillware = "skillware.cli:main"

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-mock",
    "flake8",
    "black",
]
gemini = [
    "google-genai",
]
claude = [
    "anthropic",
]
openai = [
    "openai",
]
agents = [
    "google-genai",
    "anthropic",
    "openai",
]

# --- extras: begin generated by scripts/sync_extras.py ---

compliance = [
    "google-genai",
]

data_engineering = [
    "fastembed",
    "numpy",
]

defi = [
    "web3>=6.0.0",
]

dev_tools = []

finance = []

monitoring = []

office = [
    "anthropic",
    "pymupdf",
]

optimization = []

wellness = [
    "google-genai",
]

compliance_mica_module = [
    "google-genai",
]

compliance_pii_masker = []

compliance_tos_evaluator = []

data_engineering_novelty_extractor = [
    "fastembed",
    "numpy",
]

data_engineering_synthetic_generator = []

defi_evm_tx_handler = [
    "web3>=6.0.0",
]

dev_tools_issue_resolver = []

finance_uk_companies_house_handler = []

finance_wallet_screening = []

monitoring_token_limiter = []

office_pdf_form_filler = [
    "pymupdf",
    "anthropic",
]

optimization_prompt_rewriter = []

wellness_mental_coach = [
    "google-genai",
]

all = [
    "anthropic",
    "fastembed",
    "google-genai",
    "numpy",
    "pymupdf",
    "web3>=6.0.0",
]

# --- extras: end generated by scripts/sync_extras.py ---

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["skillware*", "skills*"]

# Non-Python skill assets (yaml, md, json, data/) ship via MANIFEST.in (graft skills)
# and this wildcard. No per-skill entries needed when adding registry skills.
[tool.setuptools.package-data]
skills = ["**/*"]

[tool.pytest.ini_options]
testpaths = ["tests", "skills"]
addopts = "--ignore=examples"

[tool.black]
line-length = 88
target-version = ["py310"]
